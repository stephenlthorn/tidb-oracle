services:
  api:
    secrets:
      - google_service_account
    environment:
      GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: /run/secrets/google_service_account

  worker:
    secrets:
      - google_service_account
    environment:
      GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: /run/secrets/google_service_account

  beat:
    secrets:
      - google_service_account
    environment:
      GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: /run/secrets/google_service_account

secrets:
  google_service_account:
    file: ${GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON_FILE:?Set GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON_FILE to your service-account JSON path}
