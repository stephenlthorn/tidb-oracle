services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tidb_oracle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/tidb_oracle
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ../data:/app/data
    ports:
      - "8000:8000"

  worker:
    build:
      context: ..
      dockerfile: api/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/tidb_oracle
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ../data:/app/data
    command: celery -A app.worker.celery_app worker --loglevel=info

  beat:
    build:
      context: ..
      dockerfile: api/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/tidb_oracle
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ../data:/app/data
    command: celery -A app.worker.celery_app beat --loglevel=info

  ui:
    build:
      context: ..
      dockerfile: ui/Dockerfile
    environment:
      API_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
      - "1455:1455"
    depends_on:
      - api

volumes:
  postgres_data:
